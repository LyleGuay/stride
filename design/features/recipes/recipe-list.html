<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipes — Stride</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            stride: {
              50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',
              300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',
              600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .line-clamp-1 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ═══ APP SHELL ══════════════════════════════════════════════════════ -->
<div class="min-h-screen bg-gray-50">

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 z-50 flex flex-col -translate-x-full lg:translate-x-0 transition-transform duration-200" id="sidebar">
    <div class="h-14 flex items-center px-5 border-b border-gray-200">
      <h1 class="text-xl font-bold text-stride-600">Stride</h1>
    </div>
    <nav class="p-3">
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z"/></svg>
        Calorie Log
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm mt-1 text-gray-600 hover:bg-gray-50">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        Habits
      </a>
      <!-- Recipes — active -->
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm mt-1 bg-stride-50 text-stride-700 font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
        Recipes
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm mt-1 text-gray-600 hover:bg-gray-50">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
        Settings
      </a>
    </nav>

    <!-- Profile footer -->
    <div class="absolute bottom-0 left-0 right-0 p-3 border-t border-gray-100">
      <div class="flex items-center gap-2.5 px-2 py-2 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
        <div class="w-7 h-7 rounded-full bg-stride-100 text-stride-700 text-xs font-bold flex items-center justify-center shrink-0">L</div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-medium text-gray-700 truncate">lyle</p>
          <p class="text-[10px] text-gray-400 truncate">lyle@example.com</p>
        </div>
        <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9"/></svg>
      </div>
    </div>
  </aside>

  <!-- Main area (offset for sidebar) -->
  <main class="lg:ml-64 min-h-screen">

    <!-- Sticky h-14 page header — full width, aligns with sidebar -->
    <div class="sticky top-0 z-20 bg-white border-b border-gray-200">
      <div class="h-14 px-6 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <button onclick="openSidebar()" class="lg:hidden p-1.5 rounded-md text-gray-500 hover:bg-gray-100 mr-1 shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
          </button>
          <h2 class="text-base font-semibold text-gray-900">Recipes</h2>
          <span class="text-xs text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded-full font-medium">12</span>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="toggleAISheet()" class="flex items-center gap-1.5 bg-stride-600 hover:bg-stride-700 text-white text-sm font-medium px-3 py-2 rounded-lg transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/></svg>
            ✦ AI Generate
          </button>
          <button class="w-9 h-9 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:text-stride-600 hover:border-stride-300 transition-colors text-xl font-light" title="New recipe">+</button>
        </div>
      </div>
    </div>

    <!-- Scrollable body -->
    <div class="max-w-4xl mx-auto px-6 py-5">

      <!-- Search + filter row -->
      <div class="flex items-center gap-3 mb-4">
        <div class="relative flex-1 max-w-xs">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
          <input type="text" placeholder="Search recipes…" oninput="filterRecipes(this.value)"
            class="w-full pl-9 pr-4 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stride-500 focus:border-transparent" />
        </div>
        <!-- Category chips -->
        <div class="flex gap-1.5 overflow-x-auto scrollbar-hide">
          <button onclick="filterCategory('all')" id="chip-all"
            class="chip shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors bg-stride-600 text-white border-stride-600">All</button>
          <button onclick="filterCategory('breakfast')" id="chip-breakfast"
            class="chip shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-gray-200 text-gray-600 hover:border-stride-300">Breakfast</button>
          <button onclick="filterCategory('lunch')" id="chip-lunch"
            class="chip shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-gray-200 text-gray-600 hover:border-stride-300">Lunch</button>
          <button onclick="filterCategory('dinner')" id="chip-dinner"
            class="chip shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-gray-200 text-gray-600 hover:border-stride-300">Dinner</button>
          <button onclick="filterCategory('dessert')" id="chip-dessert"
            class="chip shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-gray-200 text-gray-600 hover:border-stride-300">Dessert</button>
          <button onclick="filterCategory('snack')" id="chip-snack"
            class="chip shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors border-gray-200 text-gray-600 hover:border-stride-300">Snack</button>
        </div>
      </div>

      <!-- Recipe grid -->
      <div id="recipe-grid" class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
      <div id="no-results" class="hidden text-center py-20">
        <p class="text-gray-400 text-sm">No recipes found</p>
      </div>
    </div>
  </main>
</div>

<!-- AI Generation Sheet -->
<div id="ai-sheet" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/40" onclick="toggleAISheet()"></div>
  <div class="absolute bottom-0 left-0 right-0 ml-64 bg-white rounded-t-2xl p-5 shadow-2xl">
    <div class="max-w-lg mx-auto">
      <div class="flex justify-center mb-4"><div class="w-10 h-1 bg-gray-300 rounded-full"></div></div>
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 bg-stride-100 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-stride-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/></svg>
        </div>
        <h2 class="text-base font-semibold text-gray-900">Generate Recipe with AI</h2>
      </div>
      <textarea id="ai-prompt" placeholder="Describe a recipe… e.g. 'High-protein chicken stir fry with broccoli, under 500 calories'" rows="4"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stride-500 resize-none"></textarea>
      <div class="flex gap-2 mt-3">
        <button onclick="toggleAISheet()" class="flex-1 border border-gray-200 text-gray-600 text-sm font-medium py-2.5 rounded-xl hover:bg-gray-50">Cancel</button>
        <button onclick="simulateGenerate()" class="flex-1 bg-stride-600 hover:bg-stride-700 text-white text-sm font-medium py-2.5 rounded-xl flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/></svg>
          Generate
        </button>
      </div>
      <div id="ai-preview" class="hidden mt-4 border border-stride-200 bg-stride-50 rounded-xl p-4">
        <div class="flex items-start justify-between mb-2">
          <div><p class="text-sm font-semibold text-gray-900">High-Protein Chicken Stir Fry</p>
          <p class="text-xs text-gray-500 mt-0.5">Dinner · Serves 2 · ~420 cal/serving</p></div>
          <span class="text-[10px] bg-stride-100 text-stride-700 px-2 py-0.5 rounded-full font-medium">Preview</span>
        </div>
        <div class="grid grid-cols-3 gap-2 mb-3 text-center">
          <div class="bg-white rounded-lg py-1.5"><p class="text-xs font-semibold text-blue-600">42g</p><p class="text-[10px] text-gray-400">Protein</p></div>
          <div class="bg-white rounded-lg py-1.5"><p class="text-xs font-semibold text-amber-500">28g</p><p class="text-[10px] text-gray-400">Carbs</p></div>
          <div class="bg-white rounded-lg py-1.5"><p class="text-xs font-semibold text-pink-500">12g</p><p class="text-[10px] text-gray-400">Fat</p></div>
        </div>
        <p class="text-[10px] text-gray-500 mb-3">7 ingredients · 6 steps · ~25 min</p>
        <div class="flex gap-2">
          <button onclick="alert('Regenerating...')" class="flex-1 border border-gray-200 text-gray-500 text-xs font-medium py-2 rounded-lg hover:bg-gray-50">Regenerate</button>
          <button onclick="toggleAISheet(); window.location.href='recipe-detail.html'" class="flex-1 bg-stride-600 text-white text-xs font-medium py-2 rounded-lg hover:bg-stride-700">Open Recipe →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const recipes = [
  { id:1, name:'Pumpkin Pie', category:'dessert', emoji:'🥧', calories:310, protein:5, carbs:42, fat:13, steps:7, time:'1h 20m' },
  { id:2, name:'Chicken Stir Fry', category:'dinner', emoji:'🍳', calories:420, protein:42, carbs:28, fat:12, steps:6, time:'25 min' },
  { id:3, name:'Overnight Oats', category:'breakfast', emoji:'🥣', calories:380, protein:18, carbs:54, fat:9, steps:3, time:'5 min' },
  { id:4, name:'Greek Salad', category:'lunch', emoji:'🥗', calories:280, protein:8, carbs:14, fat:22, steps:4, time:'10 min' },
  { id:5, name:'Protein Smoothie', category:'breakfast', emoji:'🥤', calories:340, protein:35, carbs:28, fat:6, steps:2, time:'3 min' },
  { id:6, name:'Beef Tacos', category:'dinner', emoji:'🌮', calories:510, protein:32, carbs:38, fat:21, steps:8, time:'30 min' },
  { id:7, name:'Chocolate Bark', category:'snack', emoji:'🍫', calories:160, protein:3, carbs:18, fat:9, steps:4, time:'15 min' },
  { id:8, name:'Lentil Soup', category:'lunch', emoji:'🍲', calories:290, protein:16, carbs:44, fat:4, steps:5, time:'40 min' },
  { id:9, name:'Banana Protein Bites', category:'snack', emoji:'🍌', calories:95, protein:8, carbs:12, fat:2, steps:3, time:'10 min' },
  { id:10, name:'Salmon & Asparagus', category:'dinner', emoji:'🐟', calories:460, protein:48, carbs:10, fat:24, steps:5, time:'20 min' },
  { id:11, name:'Avocado Toast', category:'breakfast', emoji:'🥑', calories:320, protein:10, carbs:30, fat:18, steps:3, time:'5 min' },
  { id:12, name:'Berry Yogurt Parfait', category:'snack', emoji:'🫐', calories:220, protein:14, carbs:32, fat:3, steps:2, time:'3 min' },
]
const catColors = { breakfast:'bg-amber-100 text-amber-700', lunch:'bg-green-100 text-green-700', dinner:'bg-blue-100 text-blue-700', dessert:'bg-pink-100 text-pink-700', snack:'bg-purple-100 text-purple-700', other:'bg-gray-100 text-gray-600' }
const catBg = { breakfast:'bg-amber-50', lunch:'bg-green-50', dinner:'bg-blue-50', dessert:'bg-pink-50', snack:'bg-purple-50', other:'bg-gray-50' }
let activeCategory = 'all', searchQuery = ''

function openSidebar() {
  document.getElementById('sidebar').classList.remove('-translate-x-full')
  document.getElementById('sidebar-overlay').classList.remove('hidden')
}
function closeSidebar() {
  document.getElementById('sidebar').classList.add('-translate-x-full')
  document.getElementById('sidebar-overlay').classList.add('hidden')
}

function renderCards() {
  const grid = document.getElementById('recipe-grid')
  const filtered = recipes.filter(r => (activeCategory==='all'||r.category===activeCategory) && r.name.toLowerCase().includes(searchQuery.toLowerCase()))
  if (!filtered.length) { grid.classList.add('hidden'); document.getElementById('no-results').classList.remove('hidden'); return }
  grid.classList.remove('hidden'); document.getElementById('no-results').classList.add('hidden')
  grid.innerHTML = filtered.map(r => `
    <div onclick="window.location.href='recipe-detail.html'" class="bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all cursor-pointer hover:-translate-y-0.5">
      <div class="${catBg[r.category]} flex items-center justify-center py-8 text-5xl">${r.emoji}</div>
      <div class="p-3">
        <p class="text-sm font-semibold text-gray-900 line-clamp-1 mb-1.5">${r.name}</p>
        <div class="flex items-center justify-between mb-2">
          <span class="text-[10px] font-medium px-1.5 py-0.5 rounded-full ${catColors[r.category]} capitalize">${r.category}</span>
          <span class="text-[10px] text-gray-400">${r.time}</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-sm font-semibold text-gray-700">${r.calories} cal</span>
          <span class="text-[10px] text-gray-400">${r.steps} steps</span>
        </div>
        <div class="flex gap-1.5 mt-1 text-[10px]">
          <span class="text-blue-500">${r.protein}P</span>·<span class="text-amber-500">${r.carbs}C</span>·<span class="text-pink-500">${r.fat}F</span>
        </div>
      </div>
    </div>
  `).join('')
}

function filterCategory(cat) {
  activeCategory = cat
  document.querySelectorAll('.chip').forEach(el => {
    const active = el.id === `chip-${cat}`
    el.className = `chip shrink-0 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors ${active ? 'bg-stride-600 text-white border-stride-600' : 'border-gray-200 text-gray-600 hover:border-stride-300'}`
  })
  renderCards()
}

function filterRecipes(val) { searchQuery = val; renderCards() }

function toggleAISheet() {
  document.getElementById('ai-sheet').classList.toggle('hidden')
  document.getElementById('ai-preview').classList.add('hidden')
  document.getElementById('ai-prompt').value = ''
}

function simulateGenerate() {
  if (!document.getElementById('ai-prompt').value.trim()) return
  document.getElementById('ai-preview').classList.remove('hidden')
}

renderCards()
</script>
</body>
</html>
